name: CI Pipeline
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  # Standard pipeline validation
  pipeline:
    name: Standard Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pipeline summary
        run: |
          echo "========================================="
          echo "  Standard Pipeline: demo-product"
          echo "========================================="
          echo ""
          echo "Steps executed:"
          echo "  1. Source checkout"
          echo "  2. Stack detection: Python (auto)"
          echo "  3. Build"
          echo "  4. Unit tests"
          echo "  5. SAST scan (SonarQube)"
          echo "  6. SBOM generation"
          echo "  7. Security verification"
          echo "  8. Container build + push"
          echo ""
          echo "Platform standards enforced automatically."

  # AI code review on PRs — Claude reviews against platform standards
  ai-review:
    name: AI Code Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout platform config
        uses: actions/checkout@v4
        with:
          repository: shermanlye-ideagen/demo-cicd-platform
          path: platform
          sparse-checkout: |
            config/
            scripts/ai-review.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
          echo "Diff size: $(wc -l < /tmp/pr-diff.txt) lines"

      - name: Run AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python platform/scripts/ai-review.py \
            --diff /tmp/pr-diff.txt \
            --product "demo-product" \
            --standards platform/config/platform-standards.yaml \
            --boundaries platform/config/conventions/self-service-boundaries.yaml

      - name: Post Review Comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/ai-review-output.md

  # Unit tests
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest httpx
      - name: Run tests
        run: python -m pytest tests/ -v
