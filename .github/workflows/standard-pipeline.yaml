name: "Standard Pipeline: demo-product"
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  # ── Build ──────────────────────────────────────────────
  build:
    name: "Build (Python 3.12)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/requirements.txt
      - name: Verify build
        run: python -c "from src.app import app; print('Build OK:', app.title, app.version)"

  # ── Unit Tests ─────────────────────────────────────────
  test:
    name: "Unit Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest httpx
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── SAST Scan (SonarQube) ──────────────────────────────
  sast-scan:
    name: "SAST Scan (SonarQube)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SAST analysis
        run: |
          echo "Running SonarQube SAST scan..."
          echo "Analyzing src/ for security vulnerabilities"
          echo "Coverage floor: 60% (silver tier)"
          echo "SAST scan passed"

  # ── SBOM Generation ────────────────────────────────────
  sbom:
    name: "SBOM Generation"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM
        run: |
          echo "Generating Software Bill of Materials..."
          echo "Scanning dependencies from src/requirements.txt"
          echo "SBOM generated: sbom-demo-product.json"

  # ── Security Verification ──────────────────────────────
  security-verify:
    name: "Security Verification"
    needs: [sast-scan, sbom]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify security gates
        run: |
          echo "Verifying security gates..."
          echo "  SAST: passed"
          echo "  SBOM: generated"
          echo "  Vulnerability scan: clean"
          echo "All security gates passed"

  # ── Container Build & Push ─────────────────────────────
  container-push:
    name: "Container Build & Push"
    needs: [test, security-verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: |
          echo "Building container: demo-product:${{ github.sha }}"
          echo "FROM python:3.12-slim" > /tmp/verify.txt
          echo "Container image built successfully"
      - name: Push to registry
        run: |
          echo "Pushing to ECR: demo-product:${{ github.sha }}"
          echo "Container pushed successfully"

  # ── AI Code Review (Claude) ────────────────────────────
  ai-review:
    name: "AI Code Review (Claude)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout platform config
        uses: actions/checkout@v4
        with:
          repository: shermanlye-ideagen/demo-cicd-platform
          path: platform
          sparse-checkout: |
            config/
            scripts/ai-review.py

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
          echo "Diff size: $(wc -l < /tmp/pr-diff.txt) lines"

      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python platform/scripts/ai-review.py \
            --diff /tmp/pr-diff.txt \
            --product "demo-product" \
            --standards platform/config/platform-standards.yaml \
            --boundaries platform/config/conventions/self-service-boundaries.yaml

      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body-file /tmp/ai-review-output.md
