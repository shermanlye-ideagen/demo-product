name: "Standard Pipeline: demo-product"
on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

jobs:
  # ── Build ──────────────────────────────────────────────
  build:
    name: "Build (Python 3.12)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/requirements.txt
      - name: Verify build
        run: python -c "from src.app import app; print(f'Build OK: {app.title} {app.version}')"

  # ── Unit Tests ─────────────────────────────────────────
  test:
    name: "Unit Tests"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r src/requirements.txt pytest httpx
      - name: Run tests
        run: python -m pytest tests/ -v --tb=short

  # ── SAST Scan (SonarQube) ──────────────────────────────
  sast-scan:
    name: "SAST Scan (SonarQube)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SonarQube analysis
        run: |
          echo "Connecting to SonarQube (self-hosted)..."
          echo "Project: demo-product"
          echo "Analyzing src/ for security vulnerabilities..."
          echo "Coverage floor: 60% (silver tier policy)"
          echo "Duplication max: 10%"
          echo "SAST scan: PASSED"

  # ── SBOM Generation (Veracode) ─────────────────────────
  sbom:
    name: "SBOM Generation (Veracode)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate SBOM via Veracode
        run: |
          echo "Generating Software Bill of Materials..."
          echo "Scanner: Veracode SCA"
          echo "Scanning pip dependencies from requirements.txt"
          echo "Output: sbom-demo-product.json (CycloneDX format)"
          echo "SBOM generation: COMPLETE"

  # ── E2E Tests (Playwright) ─────────────────────────────
  e2e-tests:
    name: "E2E Tests (Playwright)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Playwright E2E tests
        run: |
          echo "Starting Playwright E2E test suite..."
          echo "Target: http://localhost:8000"
          echo "Tests: login, tenant-creation, audit-export"
          echo "Browser: chromium (headless)"
          echo "3/3 E2E tests passed"

  # ── Contract Tests (Pact) ──────────────────────────────
  contract-tests:
    name: "Contract Tests (Pact)"
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Pact contract tests
        run: |
          echo "Running Pact contract verification..."
          echo "Provider: demo-product API"
          echo "Consumer contracts: 2 (frontend, mobile)"
          echo "Pact Broker: self-hosted"
          echo "All contracts verified: PASSED"

  # ── Security Verification ──────────────────────────────
  security-verify:
    name: "Security Verification"
    needs: [sast-scan, sbom]
    runs-on: ubuntu-latest
    steps:
      - name: Verify all security gates
        run: |
          echo "Verifying security gates..."
          echo "  SAST (SonarQube): PASSED"
          echo "  SBOM (Veracode):  GENERATED"
          echo "  CVE scan:         0 critical, 0 high"
          echo "  License check:    All licenses approved"
          echo "All security gates PASSED"

  # ── Container Build & Push ─────────────────────────────
  container-push:
    name: "Container Build & Push"
    needs: [test, security-verify, e2e-tests, contract-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: echo "Building container demo-product:${{ github.sha }}"
      - name: Push to ECR
        run: echo "Pushed to ECR: demo-product:${{ github.sha }}"

  # ── Deploy to Test Environment ─────────────────────────
  deploy-test:
    name: "Deploy to Test Environment"
    needs: container-push
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Deploy via ArgoCD
        run: |
          echo "Deploying demo-product:${{ github.sha }} to test environment..."
          echo "Cluster: eks-test-cluster"
          echo "Namespace: demo-product-test"
          echo "Helm release: demo-product"
          echo "Deployment: SUCCESSFUL"
          echo "Health check: /health returned 200 OK"

  # ── New Relic Baseline Capture ─────────────────────────
  nr-baseline:
    name: "New Relic Baseline Capture"
    needs: deploy-test
    runs-on: ubuntu-latest
    steps:
      - name: Capture baseline metrics
        run: |
          echo "Capturing New Relic baseline metrics..."
          echo "Application: demo-product (test)"
          echo "Metrics: response_time, throughput, error_rate, apdex"
          echo "Baseline snapshot stored: nr-baseline-${{ github.sha }}.json"
          echo "Baseline capture: COMPLETE"

  # ── AI Code Review (Claude) ────────────────────────────
  ai-review:
    name: "AI Code Review (Claude)"
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Checkout platform config
        uses: actions/checkout@v4
        with:
          repository: shermanlye-ideagen/demo-cicd-platform
          path: platform
          sparse-checkout: |
            config/
            scripts/ai-review.py
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Get PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > /tmp/pr-diff.txt
      - name: Run AI review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python platform/scripts/ai-review.py \
            --diff /tmp/pr-diff.txt \
            --product "demo-product" \
            --standards platform/config/platform-standards.yaml \
            --boundaries platform/config/conventions/self-service-boundaries.yaml
      - name: Post review comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file /tmp/ai-review-output.md
